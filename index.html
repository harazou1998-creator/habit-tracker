<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="習慣トラッカー" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>習慣トラッカー</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Meiryo, sans-serif;
      background: #0b1020;
      color: #e8ecff;
      min-height: 100vh;
      padding: 24px 16px 80px;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 4px;
    }
    .sub {
      opacity: 0.65;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .status-bar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0d1430;
      border: 1px solid #262f5c;
      border-radius: 12px;
      padding: 8px 12px;
      margin-bottom: 16px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }
    .status-sprite-wrap {
      flex-shrink: 0;
      width: 40px;
      height: 55px;
      display: grid;
      place-items: center;
      background: #0b1020;
      border: 1px solid #262f5c;
      border-radius: 8px;
    }
    .status-sprite-wrap svg {
      width: 36px;
      height: 49.5px;
      shape-rendering: crispEdges;
    }
    .status-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .status-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .status-bar-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-bar-label {
      flex-shrink: 0;
      width: 26px;
      font-size: 9px;
      font-weight: 700;
      opacity: 0.65;
    }
    .status-track {
      flex: 1;
      min-width: 0;
      height: 6px;
      border-radius: 4px;
      background: #1c2450;
      overflow: hidden;
    }
    .status-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.25s ease;
    }
    .status-fill.hp {
      background: linear-gradient(90deg, #ff6b6b, #ff9b6b);
    }
    .status-fill.xp {
      background: linear-gradient(90deg, #5b70ff, #8fa2ff);
    }

    .page-viewport {
      overflow: hidden;
      position: relative;
      touch-action: none;
    }
    .page-track {
      display: flex;
      align-items: flex-start;
      width: 300%;
      transform: translateX(0%);
    }
    .page-slide {
      width: 33.3333%;
      flex-shrink: 0;
      min-width: 0;
    }

    .tab-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #262f5c;
      background: #141b3a;
      color: #e8ecff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .tab-btn.active {
      background: #5b70ff;
      border-color: #5b70ff;
      color: #fff;
    }

    .progress-card {
      background: linear-gradient(#141b3a, #0d1430);
      border: 1px solid #262f5c;
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 22px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }
    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .progress-top .label {
      font-size: 13px;
      opacity: 0.75;
    }
    .progress-top .count {
      font-size: 15px;
      font-weight: 600;
      color: #8fa2ff;
    }
    .progress-bar-track {
      height: 10px;
      border-radius: 6px;
      background: #1c2450;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #5b70ff, #8fa2ff);
      border-radius: 6px;
      transition: width 0.25s ease;
    }

    .calendar-card {
      background: #121834;
      border: 1px solid #232c56;
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 22px;
    }
    .calendar-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 12px;
      font-size: 14px;
      font-weight: 600;
    }
    .calendar-nav button {
      background: transparent;
      border: 1px solid #262f5c;
      color: #e8ecff;
      border-radius: 6px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
    }
    .calendar-nav button:disabled {
      opacity: 0.3;
      cursor: default;
    }
    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      font-size: 11px;
      opacity: 0.55;
      text-align: center;
      margin-bottom: 5px;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }
    .day-cell {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      cursor: pointer;
      background: #161b36;
      border: 1px solid transparent;
    }
    .day-cell .day-num {
      font-size: 12px;
    }
    .day-cell .day-ratio {
      font-size: 8px;
      opacity: 0.8;
    }
    .day-cell.empty {
      background: transparent;
      cursor: default;
    }
    .day-cell.no-data {
      cursor: default;
      opacity: 0.35;
    }
    .day-cell.future {
      opacity: 0.3;
      cursor: default;
    }
    .day-cell.today {
      border-color: #8fa2ff;
    }
    .day-cell.selected {
      border-color: #ffe66d;
      border-width: 2px;
    }

    .day-detail {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid #232c56;
    }
    .day-detail-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      opacity: 0.85;
    }
    .day-detail-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
    }
    .day-detail-row .mini-check {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid #3a4478;
      background: transparent;
      color: #5b70ff;
      font-size: 13px;
      cursor: pointer;
      display: grid;
      place-items: center;
    }
    .day-detail-row .mini-check.done {
      background: #5b70ff;
      border-color: #5b70ff;
      color: #fff;
    }
    .day-detail-row .mini-check:disabled {
      cursor: default;
      opacity: 0.4;
    }
    .day-detail-row .mini-name {
      font-size: 13px;
    }
    .day-detail-empty {
      font-size: 12px;
      opacity: 0.55;
    }

    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
    }
    .add-form input {
      flex: 1;
      background: #141b3a;
      border: 1px solid #262f5c;
      color: #e8ecff;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 14px;
      outline: none;
    }
    .add-form input:focus {
      border-color: #5b70ff;
    }
    .add-form button {
      background: #5b70ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .add-form button:hover {
      background: #6f83ff;
    }

    .habit-card {
      background: #121834;
      border: 1px solid #232c56;
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 14px;
      transition: opacity 0.15s ease;
      touch-action: none;
      cursor: pointer;
    }
    .habit-card.dragging {
      opacity: 0.6;
      position: relative;
      z-index: 5;
    }
    .habit-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .check-btn {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #3a4478;
      background: transparent;
      color: #5b70ff;
      font-size: 18px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all 0.15s ease;
    }
    .check-btn.done {
      background: #5b70ff;
      border-color: #5b70ff;
      color: #fff;
    }
    .habit-info {
      flex: 1;
      min-width: 0;
    }
    .habit-name {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .habit-stats {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 2px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .del-btn {
      flex-shrink: 0;
      background: transparent;
      border: none;
      color: #6a76ad;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      line-height: 1;
    }
    .del-btn:hover {
      color: #ff6b6b;
    }

    .habit-name-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #5b70ff;
      color: #e8ecff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      padding: 0 0 2px;
      outline: none;
      cursor: text;
    }
    .check-btn,
    .del-btn {
      cursor: pointer;
    }

    .empty {
      text-align: center;
      opacity: 0.5;
      font-size: 13px;
      padding: 40px 0;
    }

    .rpg-card {
      background: linear-gradient(#141b3a, #0d1430);
      border: 1px solid #262f5c;
      border-radius: 14px;
      padding: 20px 18px;
      margin-bottom: 22px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }
    .rpg-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 18px;
    }
    .sprite-wrap {
      flex-shrink: 0;
      width: 96px;
      height: 132px;
      display: grid;
      place-items: center;
      background: #0d1430;
      border: 1px solid #262f5c;
      border-radius: 10px;
      image-rendering: pixelated;
    }
    .sprite-wrap svg {
      width: 88px;
      height: 121px;
      shape-rendering: crispEdges;
    }
    .rpg-stats {
      flex: 1;
      min-width: 0;
    }
    .rpg-level-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .level-badge {
      flex-shrink: 0;
      background: #f1c40f;
      color: #3a2c00;
      font-weight: 700;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 999px;
    }
    .coin-display {
      font-size: 13px;
      font-weight: 600;
      color: #ffe66d;
    }
    .bar-row {
      margin-bottom: 8px;
    }
    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      opacity: 0.75;
      margin-bottom: 3px;
    }
    .bar-track {
      height: 9px;
      border-radius: 5px;
      background: #1c2450;
      overflow: hidden;
    }
    .bar-fill.hp {
      height: 100%;
      background: linear-gradient(90deg, #ff6b6b, #ff9b6b);
      border-radius: 5px;
    }
    .bar-fill.xp {
      height: 100%;
      background: linear-gradient(90deg, #5b70ff, #8fa2ff);
      border-radius: 5px;
      transition: width 0.25s ease;
    }

    .rpg-hint {
      font-size: 12px;
      opacity: 0.6;
      margin-bottom: 14px;
    }

    .shop-title {
      font-size: 14px;
      font-weight: 700;
      margin: 4px 0 12px;
    }
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }
    .shop-item {
      background: #121834;
      border: 1px solid #232c56;
      border-radius: 10px;
      padding: 12px 10px;
      text-align: center;
    }
    .shop-item .shop-emoji {
      font-size: 26px;
      margin-bottom: 4px;
    }
    .shop-item .shop-name {
      font-size: 12px;
      margin-bottom: 8px;
      min-height: 2.4em;
    }
    .shop-item button {
      width: 100%;
      background: #5b70ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 0;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .shop-item button:disabled {
      background: #262f5c;
      color: #7a86c2;
      cursor: default;
    }
    .shop-item.owned {
      border-color: #f1c40f;
    }

    .sprite-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .equipped-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px;
      max-width: 96px;
      font-size: 15px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      background: #141b3a;
      border: 1px solid #5b70ff;
      color: #e8ecff;
      padding: 12px 22px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      white-space: pre-line;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 1000;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 420px) {
      body {
        padding: 12px 8px 60px;
      }
      h1 {
        font-size: 18px;
        margin-bottom: 2px;
      }
      .sub {
        font-size: 11px;
        margin-bottom: 10px;
      }
      .status-bar {
        padding: 5px 8px;
        gap: 8px;
        margin-bottom: 10px;
      }
      .status-sprite-wrap {
        width: 30px;
        height: 41px;
      }
      .status-sprite-wrap svg {
        width: 27px;
        height: 37px;
      }
      .tab-nav {
        margin-bottom: 10px;
      }
      .tab-btn {
        font-size: 12px;
        padding: 8px 4px;
      }
      .habit-top {
        gap: 8px;
      }
      .check-btn {
        width: 34px;
        height: 34px;
        font-size: 15px;
      }
      .shop-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      }
      .calendar-card {
        padding: 10px 10px;
      }
      .calendar-nav {
        margin-bottom: 6px;
        gap: 10px;
      }
      .calendar-nav button {
        width: 24px;
        height: 24px;
        font-size: 13px;
      }
      .calendar-weekdays {
        font-size: 9px;
        margin-bottom: 3px;
      }
      .calendar-grid {
        gap: 3px;
      }
      .day-cell {
        aspect-ratio: auto;
        height: 32px;
      }
      .day-cell .day-num {
        font-size: 11px;
      }
      .day-cell .day-ratio {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>習慣トラッカー</h1>
    <div class="sub">毎日タップして積み上げよう。データはこの端末のブラウザに保存されます。</div>

    <div class="status-bar" id="statusBar"></div>

    <div class="tab-nav">
      <button type="button" class="tab-btn" id="tabTodayBtn">📋 今日</button>
      <button type="button" class="tab-btn" id="tabCalendarBtn">📅 記録</button>
      <button type="button" class="tab-btn" id="tabStatusBtn">🎮 ステータス</button>
    </div>

    <div class="page-viewport" id="pageViewport">
      <div class="page-track" id="pageTrack">
        <div class="page-slide" id="pageToday">
          <div class="progress-card">
            <div class="progress-top">
              <span class="label" id="todayLabel">今日の進捗</span>
              <span class="count" id="todayCount">0 / 0</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
            </div>
          </div>

          <form class="add-form" id="addForm">
            <input id="habitInput" type="text" placeholder="新しい習慣を入力(例: 筋トレ、読書10分)" maxlength="40" />
            <button type="submit">追加</button>
          </form>

          <div id="habitList"></div>
          <div class="empty" id="emptyMsg" style="display:none">まだ習慣が登録されていません。上のフォームから追加してください。</div>
        </div>

        <div class="page-slide" id="pageCalendar">
          <div class="calendar-card" id="calendarCard"></div>
        </div>

        <div class="page-slide" id="pageStatus">
          <div class="rpg-card" id="rpgCard"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "habit_app_v1";
    const PLAYER_KEY = "habit_app_player_v1";
    const XP_PER_CHECK = 10;
    const COINS_PER_CHECK = 5;
    const XP_PER_LEVEL = 100;

    const SHOP_ITEMS = [
      { id: "sword", emoji: "⚔️", name: "どうのつるぎ", cost: 50 },
      { id: "shield", emoji: "🛡️", name: "かわのたて", cost: 40 },
      { id: "potion", emoji: "🧪", name: "やくそう", cost: 20 },
      { id: "boots", emoji: "👢", name: "はやてのブーツ", cost: 60 },
      { id: "crown", emoji: "👑", name: "おうかん", cost: 200 },
      { id: "dragon", emoji: "🐉", name: "でんせつのタマゴ", cost: 300 }
    ];

    let habits = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    let selectedDate = todayStr();
    let editingHabitId = null;
    let currentPage = "today";
    const now0 = new Date();
    let calYear = now0.getFullYear();
    let calMonth = now0.getMonth();
    let player = JSON.parse(localStorage.getItem(PLAYER_KEY) || '{"xp":0,"coins":0,"ownedItems":[]}');

    const PAGE_ORDER = ["today", "calendar", "status"];

    function switchPage(page) {
      currentPage = page;
      render();
    }

    function updatePageTransform() {
      const track = document.getElementById("pageTrack");
      const viewport = document.getElementById("pageViewport");
      const index = PAGE_ORDER.indexOf(currentPage);
      track.style.transition = "transform 0.3s ease";
      track.style.transform = `translateX(${-(index / 3) * 100}%)`;
      const activeSlide = document.getElementById(
        currentPage === "today" ? "pageToday" : currentPage === "calendar" ? "pageCalendar" : "pageStatus"
      );
      viewport.style.height = activeSlide.scrollHeight + "px";
    }

    let swipeStart = null;

    function initSwipe() {
      const viewport = document.getElementById("pageViewport");
      const track = document.getElementById("pageTrack");

      viewport.addEventListener("pointerdown", (e) => {
        if (e.target.closest("input, textarea")) return;
        swipeStart = {
          x: e.clientX,
          y: e.clientY,
          lastY: e.clientY,
          pointerId: e.pointerId,
          index: PAGE_ORDER.indexOf(currentPage),
          moved: false,
          dragging: false,
          scrolling: false
        };
      });

      viewport.addEventListener("pointermove", (e) => {
        if (!swipeStart || swipeStart.pointerId !== e.pointerId) return;
        const dx = e.clientX - swipeStart.x;
        const dy = e.clientY - swipeStart.y;

        if (!swipeStart.moved) {
          if (Math.hypot(dx, dy) < 10) return;
          swipeStart.moved = true;
          if (Math.abs(dx) > Math.abs(dy)) {
            swipeStart.dragging = true;
            viewport.setPointerCapture(e.pointerId);
            track.style.transition = "none";
          } else {
            swipeStart.scrolling = true;
            viewport.setPointerCapture(e.pointerId);
          }
        }

        if (swipeStart.dragging) {
          e.preventDefault();
          const viewportWidth = viewport.clientWidth || 1;
          const pct = (dx / viewportWidth) * (100 / 3);
          let translatePct = -(swipeStart.index / 3) * 100 + pct;
          translatePct = Math.max(-(2 / 3) * 100 - 100 / 9, Math.min(100 / 9, translatePct));
          track.style.transform = `translateX(${translatePct}%)`;
        } else if (swipeStart.scrolling) {
          window.scrollBy(0, swipeStart.lastY - e.clientY);
          swipeStart.lastY = e.clientY;
        }
      });

      const endSwipe = (e) => {
        if (!swipeStart || swipeStart.pointerId !== e.pointerId) return;
        if (viewport.hasPointerCapture(e.pointerId)) viewport.releasePointerCapture(e.pointerId);
        if (swipeStart.dragging) {
          const dx = e.clientX - swipeStart.x;
          const viewportWidth = viewport.clientWidth || 1;
          const threshold = viewportWidth * 0.18;
          let newIndex = swipeStart.index;
          if (dx < -threshold && newIndex < PAGE_ORDER.length - 1) newIndex++;
          else if (dx > threshold && newIndex > 0) newIndex--;
          currentPage = PAGE_ORDER[newIndex];
          render();
        }
        swipeStart = null;
      };
      viewport.addEventListener("pointerup", endSwipe);
      viewport.addEventListener("pointercancel", (e) => {
        if (swipeStart && swipeStart.pointerId === e.pointerId) {
          if (viewport.hasPointerCapture(e.pointerId)) viewport.releasePointerCapture(e.pointerId);
          if (swipeStart.dragging) render();
        }
        swipeStart = null;
      });
    }

    document.getElementById("tabTodayBtn").addEventListener("click", () => switchPage("today"));
    document.getElementById("tabCalendarBtn").addEventListener("click", () => switchPage("calendar"));
    document.getElementById("tabStatusBtn").addEventListener("click", () => switchPage("status"));

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
    }

    function savePlayer() {
      localStorage.setItem(PLAYER_KEY, JSON.stringify(player));
    }

    function levelFromXp(xp) {
      return 1 + Math.floor(xp / XP_PER_LEVEL);
    }

    function maxHpForLevel(level) {
      return 20 + (level - 1) * 10;
    }

    function buyItem(itemId) {
      const item = SHOP_ITEMS.find((i) => i.id === itemId);
      if (!item || player.ownedItems.includes(itemId) || player.coins < item.cost) return;
      player.coins -= item.cost;
      player.ownedItems.push(itemId);
      savePlayer();
      render();
    }

    function formatDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function todayStr() {
      return formatDate(new Date());
    }

    function addDays(dateStr, delta) {
      const d = new Date(dateStr + "T00:00:00");
      d.setDate(d.getDate() + delta);
      return d;
    }

    function currentStreak(records) {
      const today = todayStr();
      let cursorStr = today;
      if (!records[today]) {
        cursorStr = formatDate(addDays(today, -1));
      }
      let streak = 0;
      while (records[cursorStr]) {
        streak++;
        cursorStr = formatDate(addDays(cursorStr, -1));
      }
      return streak;
    }

    function longestStreak(records) {
      const dates = Object.keys(records)
        .filter((k) => records[k])
        .sort();
      if (!dates.length) return 0;
      let max = 1;
      let cur = 1;
      for (let i = 1; i < dates.length; i++) {
        const diffDays = Math.round(
          (new Date(dates[i] + "T00:00:00") - new Date(dates[i - 1] + "T00:00:00")) / 86400000
        );
        if (diffDays === 1) {
          cur++;
          max = Math.max(max, cur);
        } else if (diffDays > 1) {
          cur = 1;
        }
      }
      return max;
    }

    function achievementRate(records, createdAt) {
      const today = todayStr();
      const daysSinceCreated =
        Math.round(
          (new Date(today + "T00:00:00") - new Date(createdAt + "T00:00:00")) / 86400000
        ) + 1;
      const windowSize = Math.max(1, Math.min(30, daysSinceCreated));
      let done = 0;
      let cursorStr = today;
      for (let i = 0; i < windowSize; i++) {
        if (records[cursorStr]) done++;
        cursorStr = formatDate(addDays(cursorStr, -1));
      }
      return Math.round((done / windowSize) * 100);
    }

    function toggleDay(habit, dateStr) {
      if (habit.records[dateStr]) {
        delete habit.records[dateStr];
        player.xp = Math.max(0, player.xp - XP_PER_CHECK);
        player.coins = Math.max(0, player.coins - COINS_PER_CHECK);
      } else {
        const prevLevel = levelFromXp(player.xp);
        habit.records[dateStr] = true;
        if (dateStr < habit.createdAt) {
          habit.createdAt = dateStr;
        }
        player.xp += XP_PER_CHECK;
        player.coins += COINS_PER_CHECK;
        const newLevel = levelFromXp(player.xp);
        let message = `⚡EXP +${XP_PER_CHECK}　🪙コイン +${COINS_PER_CHECK}`;
        if (newLevel > prevLevel) {
          message += `\n🎉 レベルアップ！ Lv.${newLevel}`;
        }
        showToast(message);
      }
      save();
      savePlayer();
      render();
    }

    let toastTimer = null;

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 5000);
    }

    function deleteHabit(id) {
      if (!confirm("この習慣を削除しますか？記録も消えます。")) return;
      habits = habits.filter((h) => h.id !== id);
      save();
      render();
    }

    function startEditHabit(id) {
      editingHabitId = id;
      render();
    }

    function saveHabitName(habit, newName) {
      const trimmed = newName.trim();
      if (trimmed) {
        habit.name = trimmed;
        save();
      }
      editingHabitId = null;
      render();
    }

    function moveHabitInArray(habitId, toIndex) {
      const fromIndex = habits.findIndex((h) => h.id === habitId);
      if (fromIndex === -1) return;
      const [moved] = habits.splice(fromIndex, 1);
      habits.splice(toIndex, 0, moved);
    }

    function dayCompletion(dateStr) {
      const done = habits.filter((h) => h.records[dateStr]).length;
      return { done, total: habits.length };
    }

    function ratioColor(ratio) {
      const base = [22, 27, 54];
      const accent = [91, 112, 255];
      const rgb = base.map((b, i) => Math.round(b + (accent[i] - b) * ratio));
      return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
    }

    function selectDate(dateStr) {
      selectedDate = dateStr;
      render();
    }

    function changeCalMonth(delta) {
      let newMonth = calMonth + delta;
      let newYear = calYear;
      if (newMonth < 0) {
        newMonth = 11;
        newYear--;
      } else if (newMonth > 11) {
        newMonth = 0;
        newYear++;
      }
      const now = new Date();
      if (newYear > now.getFullYear() || (newYear === now.getFullYear() && newMonth > now.getMonth())) {
        return;
      }
      calYear = newYear;
      calMonth = newMonth;
      render();
    }

    function buildCalendarCard() {
      const card = document.getElementById("calendarCard");
      card.innerHTML = "";

      const now = new Date();
      const isCurrentMonth = calYear === now.getFullYear() && calMonth === now.getMonth();
      const todayString = todayStr();

      const nav = document.createElement("div");
      nav.className = "calendar-nav";
      const prevBtn = document.createElement("button");
      prevBtn.textContent = "‹";
      prevBtn.addEventListener("click", () => changeCalMonth(-1));
      const label = document.createElement("span");
      label.textContent = `${calYear}年${calMonth + 1}月`;
      const nextBtn = document.createElement("button");
      nextBtn.textContent = "›";
      nextBtn.disabled = isCurrentMonth;
      nextBtn.addEventListener("click", () => changeCalMonth(1));
      nav.appendChild(prevBtn);
      nav.appendChild(label);
      nav.appendChild(nextBtn);
      card.appendChild(nav);

      const weekdays = document.createElement("div");
      weekdays.className = "calendar-weekdays";
      ["日", "月", "火", "水", "木", "金", "土"].forEach((w) => {
        const el = document.createElement("span");
        el.textContent = w;
        weekdays.appendChild(el);
      });
      card.appendChild(weekdays);

      const grid = document.createElement("div");
      grid.className = "calendar-grid";

      const firstDay = new Date(calYear, calMonth, 1);
      const startWeekday = firstDay.getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

      for (let i = 0; i < startWeekday; i++) {
        const empty = document.createElement("div");
        empty.className = "day-cell empty";
        grid.appendChild(empty);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${calYear}-${String(calMonth + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        const isFuture = dateStr > todayString;
        const { done, total } = dayCompletion(dateStr);

        const cell = document.createElement("div");
        let cls = "day-cell";
        if (dateStr === todayString) cls += " today";
        if (dateStr === selectedDate) cls += " selected";
        if (isFuture) cls += " future";
        if (!isFuture && total === 0) cls += " no-data";
        cell.className = cls;

        if (!isFuture && total > 0) {
          cell.style.backgroundColor = ratioColor(done / total);
        }

        const numEl = document.createElement("span");
        numEl.className = "day-num";
        numEl.textContent = day;
        cell.appendChild(numEl);

        if (!isFuture && total > 0) {
          const ratioEl = document.createElement("span");
          ratioEl.className = "day-ratio";
          ratioEl.textContent = `${done}/${total}`;
          cell.appendChild(ratioEl);
        }

        if (!isFuture) {
          cell.addEventListener("click", () => selectDate(dateStr));
        }

        grid.appendChild(cell);
      }

      card.appendChild(grid);
      card.appendChild(buildDayDetail(selectedDate));
    }

    const HERO_PALETTE = {
      H: "#5a3825",
      S: "#f4c28c",
      E: "#22223a",
      T: "#3b5bdb",
      B: "#f1c40f",
      P: "#26307a",
      O: "#4a2e1a",
      W: "#c9d3e0"
    };

    const HERO_ROWS = [
      ".HHHHHH.",
      "HHHHHHHH",
      ".SSSSSS.",
      ".SESSES.",
      ".SSSSSS.",
      "..TTTT..",
      ".TTTTTT.",
      "STTTTTTS",
      ".BBBBBB.",
      ".PP.PP..",
      "OOO.OOO."
    ];

    function tunicColorForLevel(level) {
      if (level >= 10) return "#caa53d";
      if (level >= 5) return "#c0392b";
      return "#3b5bdb";
    }

    function buildHeroPixelMap(level) {
      const map = {};
      const tunicColor = tunicColorForLevel(level);

      HERO_ROWS.forEach((rowStr, y) => {
        rowStr.split("").forEach((ch, x) => {
          if (ch === ".") return;
          let color = HERO_PALETTE[ch];
          if (ch === "T") color = tunicColor;
          if (ch === "O" && player.ownedItems.includes("boots")) color = "#2a9d8f";
          map[`${x},${y}`] = color;
        });
      });

      if (player.ownedItems.includes("sword")) {
        map["7,6"] = HERO_PALETTE.W;
        map["7,7"] = HERO_PALETTE.W;
      }
      if (player.ownedItems.includes("shield")) {
        map["0,6"] = "#8a5a2a";
        map["0,7"] = "#a8712f";
      }
      if (player.ownedItems.includes("crown")) {
        map["2,0"] = "#f1c40f";
        map["3,0"] = "#f1c40f";
        map["4,0"] = "#f1c40f";
        map["5,0"] = "#f1c40f";
      }

      return map;
    }

    function buildHeroSprite(level) {
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", "0 0 8 11");
      const pixelMap = buildHeroPixelMap(level);

      Object.keys(pixelMap).forEach((key) => {
        const [x, y] = key.split(",").map(Number);
        const color = pixelMap[key];
        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x", x);
        rect.setAttribute("y", y);
        rect.setAttribute("width", 1);
        rect.setAttribute("height", 1);
        rect.setAttribute("fill", color);
        svg.appendChild(rect);
      });

      return svg;
    }

    function render() {
      const today = todayStr();
      const list = document.getElementById("habitList");
      const emptyMsg = document.getElementById("emptyMsg");
      list.innerHTML = "";

      if (!habits.length) {
        emptyMsg.style.display = "block";
      } else {
        emptyMsg.style.display = "none";
      }

      habits.forEach((habit) => {
        const card = document.createElement("div");
        card.className = "habit-card";
        card.dataset.habitId = habit.id;

        const top = document.createElement("div");
        top.className = "habit-top";

        let pressStart = null;
        let longPressTimer = null;

        const beginDrag = () => {
          card.classList.add("dragging");
          card.dataset.dragging = "1";
          card.setPointerCapture(pressStart.pointerId);
        };

        card.addEventListener("pointerdown", (e) => {
          if (e.target.closest(".check-btn, .del-btn, .habit-name-input")) return;
          pressStart = { x: e.clientX, y: e.clientY, lastY: e.clientY, pointerId: e.pointerId, moved: false, scrolling: false };
          longPressTimer = setTimeout(() => {
            if (pressStart && !pressStart.moved) beginDrag();
          }, 350);
        });

        card.addEventListener("pointermove", (e) => {
          if (!pressStart || pressStart.pointerId !== e.pointerId) return;

          if (card.dataset.dragging === "1") {
            e.stopPropagation();
            e.preventDefault();
            const listEl = document.getElementById("habitList");
            const cards = Array.from(listEl.querySelectorAll(".habit-card"));
            const draggedIndex = cards.indexOf(card);
            let targetIndex = -1;
            for (let i = 0; i < cards.length; i++) {
              if (cards[i] === card) continue;
              const rect = cards[i].getBoundingClientRect();
              const mid = rect.top + rect.height / 2;
              if (e.clientY < mid && i < draggedIndex) {
                targetIndex = i;
                break;
              } else if (e.clientY > mid && i > draggedIndex) {
                targetIndex = i;
                break;
              }
            }
            if (targetIndex !== -1) {
              const firstRects = new Map();
              cards.forEach((c) => {
                if (c !== card) firstRects.set(c, c.getBoundingClientRect());
              });

              if (targetIndex > draggedIndex) {
                listEl.insertBefore(card, cards[targetIndex].nextSibling);
              } else {
                listEl.insertBefore(card, cards[targetIndex]);
              }
              moveHabitInArray(habit.id, targetIndex);

              firstRects.forEach((firstRect, c) => {
                const lastRect = c.getBoundingClientRect();
                const deltaY = firstRect.top - lastRect.top;
                if (deltaY !== 0) {
                  c.style.transition = "none";
                  c.style.transform = `translateY(${deltaY}px)`;
                  requestAnimationFrame(() => {
                    c.style.transition = "transform 0.2s ease, opacity 0.15s ease";
                    c.style.transform = "";
                  });
                }
              });
            }
            return;
          }

          const dx = e.clientX - pressStart.x;
          const dy = e.clientY - pressStart.y;

          if (!pressStart.moved && Math.hypot(dx, dy) > 8) {
            pressStart.moved = true;
            clearTimeout(longPressTimer);
            if (Math.abs(dy) > Math.abs(dx)) {
              pressStart.scrolling = true;
              card.setPointerCapture(e.pointerId);
            }
          }

          if (pressStart.scrolling) {
            e.stopPropagation();
            window.scrollBy(0, pressStart.lastY - e.clientY);
            pressStart.lastY = e.clientY;
          }
        });

        const endPress = (e) => {
          if (!pressStart || pressStart.pointerId !== e.pointerId) return;
          clearTimeout(longPressTimer);
          const wasDragging = card.dataset.dragging === "1";
          if (card.hasPointerCapture(e.pointerId)) card.releasePointerCapture(e.pointerId);

          if (wasDragging) {
            card.dataset.dragging = "";
            card.classList.remove("dragging");
            save();
            render();
          } else if (!pressStart.moved && editingHabitId !== habit.id) {
            startEditHabit(habit.id);
          }
          pressStart = null;
        };
        card.addEventListener("pointerup", endPress);
        card.addEventListener("pointercancel", (e) => {
          clearTimeout(longPressTimer);
          card.dataset.dragging = "";
          card.classList.remove("dragging");
          pressStart = null;
        });

        const checkBtn = document.createElement("button");
        checkBtn.className = "check-btn" + (habit.records[today] ? " done" : "");
        checkBtn.textContent = habit.records[today] ? "✓" : "";
        checkBtn.addEventListener("click", () => toggleDay(habit, today));

        const info = document.createElement("div");
        info.className = "habit-info";

        const isEditing = editingHabitId === habit.id;
        if (isEditing) {
          const nameInput = document.createElement("input");
          nameInput.type = "text";
          nameInput.className = "habit-name-input";
          nameInput.value = habit.name;
          nameInput.maxLength = 40;
          nameInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") saveHabitName(habit, nameInput.value);
            if (e.key === "Escape") {
              editingHabitId = null;
              render();
            }
          });
          nameInput.addEventListener("blur", () => saveHabitName(habit, nameInput.value));
          info.appendChild(nameInput);
        } else {
          const name = document.createElement("div");
          name.className = "habit-name";
          name.textContent = habit.name;
          info.appendChild(name);
        }

        const stats = document.createElement("div");
        stats.className = "habit-stats";
        const streak = currentStreak(habit.records);
        const longest = longestStreak(habit.records);
        const rate = achievementRate(habit.records, habit.createdAt);
        stats.innerHTML = `<span>🔥 連続 ${streak}日</span><span>🏆 最長 ${longest}日</span><span>📊 直近30日 ${rate}%</span>`;
        info.appendChild(stats);

        const delBtn = document.createElement("button");
        delBtn.className = "del-btn";
        delBtn.textContent = "×";
        delBtn.addEventListener("click", () => deleteHabit(habit.id));

        top.appendChild(checkBtn);
        top.appendChild(info);
        top.appendChild(delBtn);

        card.appendChild(top);
        list.appendChild(card);

        if (isEditing) {
          const input = card.querySelector(".habit-name-input");
          const placeCursorAtEnd = () => {
            const len = input.value.length;
            input.setSelectionRange(len, len);
          };
          input.focus();
          placeCursorAtEnd();
          setTimeout(placeCursorAtEnd, 0);
          setTimeout(placeCursorAtEnd, 50);
        }
      });

      const doneCount = habits.filter((h) => h.records[today]).length;
      document.getElementById("todayCount").textContent = `${doneCount} / ${habits.length}`;
      const pct = habits.length ? Math.round((doneCount / habits.length) * 100) : 0;
      document.getElementById("progressFill").style.width = pct + "%";

      buildCalendarCard();
      buildRpgCard();
      buildStatusBar();

      updatePageTransform();
      document.getElementById("tabTodayBtn").classList.toggle("active", currentPage === "today");
      document.getElementById("tabCalendarBtn").classList.toggle("active", currentPage === "calendar");
      document.getElementById("tabStatusBtn").classList.toggle("active", currentPage === "status");
    }

    document.getElementById("addForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const input = document.getElementById("habitInput");
      const name = input.value.trim();
      if (!name) return;
      habits.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        name,
        createdAt: todayStr(),
        records: {}
      });
      input.value = "";
      save();
      render();
    });

    initSwipe();
    render();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
